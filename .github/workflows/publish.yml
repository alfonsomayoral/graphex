name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using Trusted Publishing
# (OIDC) — no API token is stored anywhere. The PyPI project must have a matching
# trusted publisher configured (repo: alfonsomayoral/graphex, workflow:
# publish.yml, environment: pypi). See CONTRIBUTING / the release checklist.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: uv build
      - name: Validate metadata
        run: uvx twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/graphex
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
