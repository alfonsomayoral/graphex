name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, using Trusted Publishing
# (OIDC) — no API token is stored anywhere. The PyPI project (distribution name
# "apexgraph") must have a matching trusted publisher configured (repo:
# alfonsomayoral/graphex, workflow: publish.yml, environment: pypi). See RELEASING.md.
#
# A manual `workflow_dispatch` run exercises the whole pipeline (build, metadata
# check, artifact round-trip) as a dry run WITHOUT publishing — the upload step
# only runs for real `release` events.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: uv build
      - name: Validate metadata
        run: uvx twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/apexgraph
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
